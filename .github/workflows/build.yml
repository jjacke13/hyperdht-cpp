name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-linux-x86_64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build pkg-config libsodium-dev libuv1-dev

      - name: Build static
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DHYPERDHT_BUILD_TESTS=OFF && ninja -C build

      - name: Build shared
        run: cmake -B build-shared -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON -DHYPERDHT_BUILD_TESTS=OFF && ninja -C build-shared

      - name: Build tests & run
        run: |
          cmake -B build-test -G Ninja -DCMAKE_BUILD_TYPE=Debug -DHYPERDHT_BUILD_TESTS=ON
          ninja -C build-test
          cd build-test && ctest -L unit --output-on-failure -j$(nproc) --timeout 30 -E "LiveBootstrap|LiveConnect|FindPeerRandomKey|Cross|CrossTest|TableRetryAfterExternalSeedFlood"

      - name: Package
        run: |
          mkdir -p dist/lib dist/include
          cp build/libhyperdht.a dist/lib/
          cp build-shared/libhyperdht.so dist/lib/
          strip --strip-unneeded -o dist/lib/libhyperdht-stripped.a build/libhyperdht.a
          strip --strip-unneeded -o dist/lib/libhyperdht-stripped.so build-shared/libhyperdht.so
          cp -r include/hyperdht dist/include/
          tar czf hyperdht-x86_64-linux.tar.gz -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: hyperdht-x86_64-linux
          path: hyperdht-x86_64-linux.tar.gz

  build-linux-aarch64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build pkg-config libsodium-dev libuv1-dev

      - name: Build static
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DHYPERDHT_BUILD_TESTS=OFF && ninja -C build

      - name: Build shared
        run: cmake -B build-shared -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON -DHYPERDHT_BUILD_TESTS=OFF && ninja -C build-shared

      - name: Build tests & run
        run: |
          cmake -B build-test -G Ninja -DCMAKE_BUILD_TYPE=Debug -DHYPERDHT_BUILD_TESTS=ON
          ninja -C build-test
          cd build-test && ctest -L unit --output-on-failure -j$(nproc) --timeout 30 -E "LiveBootstrap|LiveConnect|FindPeerRandomKey|Cross|CrossTest|TableRetryAfterExternalSeedFlood"

      - name: Package
        run: |
          mkdir -p dist/lib dist/include
          cp build/libhyperdht.a dist/lib/
          cp build-shared/libhyperdht.so dist/lib/
          strip --strip-unneeded -o dist/lib/libhyperdht-stripped.a build/libhyperdht.a
          strip --strip-unneeded -o dist/lib/libhyperdht-stripped.so build-shared/libhyperdht.so
          cp -r include/hyperdht dist/include/
          tar czf hyperdht-aarch64-linux.tar.gz -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: hyperdht-aarch64-linux
          path: hyperdht-aarch64-linux.tar.gz

  build-macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install deps
        run: brew install cmake ninja libsodium libuv pkg-config

      - name: Build static
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DHYPERDHT_BUILD_TESTS=OFF && ninja -C build

      - name: Build shared
        run: cmake -B build-shared -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON -DHYPERDHT_BUILD_TESTS=OFF && ninja -C build-shared

      - name: Build tests & run
        run: |
          cmake -B build-test -G Ninja -DCMAKE_BUILD_TYPE=Debug -DHYPERDHT_BUILD_TESTS=ON
          ninja -C build-test
          cd build-test && ctest -L unit --output-on-failure -j$(sysctl -n hw.ncpu) --timeout 30 -E "LiveBootstrap|LiveConnect|FindPeerRandomKey|Cross|CrossTest|TableRetryAfterExternalSeedFlood"

      - name: Package
        run: |
          mkdir -p dist/lib dist/include
          cp build/libhyperdht.a dist/lib/
          cp build-shared/libhyperdht.dylib dist/lib/
          strip -x -o dist/lib/libhyperdht-stripped.a build/libhyperdht.a
          strip -x -o dist/lib/libhyperdht-stripped.dylib build-shared/libhyperdht.dylib
          cp -r include/hyperdht dist/include/
          tar czf hyperdht-arm64-macos.tar.gz -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: hyperdht-arm64-macos
          path: hyperdht-arm64-macos.tar.gz

  build-android-arm64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build

      - name: Build for Android arm64-v8a
        run: |
          cmake -B build-android -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DCMAKE_BUILD_TYPE=Release \
            -DHYPERDHT_BUILD_TESTS=OFF
          ninja -C build-android

      - name: Build JNI bridge
        run: |
          $ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android26-clang++ \
            -std=c++20 -O2 -shared -fPIC \
            -I include -I deps/libudx/include \
            -I $JAVA_HOME/include -I $JAVA_HOME/include/linux \
            wrappers/kotlin/src/main/cpp/hyperdht_jni.cpp \
            -L build-android -lhyperdht -ludx \
            -o build-android/libhyperdht_jni.so

      - name: Package
        run: |
          mkdir -p dist/lib dist/include
          cp build-android/libhyperdht.a dist/lib/
          cp build-android/libudx.a dist/lib/
          cp build-android/libhyperdht_jni.so dist/lib/ || true
          cp -r include/hyperdht dist/include/
          cp -r wrappers/kotlin/src/main/kotlin dist/kotlin
          tar czf hyperdht-android-arm64.tar.gz -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: hyperdht-android-arm64
          path: hyperdht-android-arm64.tar.gz
