name: Windows

on:
  push:
    branches: ['feat/windows-ci']
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows-x86_64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Ninja
        run: choco install -y ninja

      - name: Install libsodium + libuv via vcpkg
        shell: pwsh
        run: |
          vcpkg install libsodium:x64-windows-static-md libuv:x64-windows-static-md
          echo "VCPKG_TOOLCHAIN=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" >> $env:GITHUB_ENV

      - name: Patch libudx for MSVC compatibility
        shell: bash
        run: |
          # MSVC doesn't support GCC's "X ?: Y" Elvis operator (missing middle
          # operand). Both sites read pure struct fields so duplicating the
          # expression is safe (no side effects).
          sed -i 's|stream->delivered + stream->inflight_queue.len ?: 1|(stream->delivered + stream->inflight_queue.len) ? (stream->delivered + stream->inflight_queue.len) : 1|g' deps/libudx/src/udx_rate.c
          sed -i 's|(stream->delivered + stream->inflight_queue.len) ?: 1|((stream->delivered + stream->inflight_queue.len) ? (stream->delivered + stream->inflight_queue.len) : 1)|g' deps/libudx/src/udx_bbr.c
          # Verify the patches stuck (will fail loudly if the upstream lines change)
          grep -q '?: 1' deps/libudx/src/udx_rate.c && { echo "udx_rate.c not patched"; exit 1; } || true
          grep -q '?: 1' deps/libudx/src/udx_bbr.c && { echo "udx_bbr.c not patched"; exit 1; } || true

      - name: Build static
        shell: pwsh
        run: |
          cmake -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DHYPERDHT_BUILD_TESTS=OFF `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_TOOLCHAIN" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static-md
          cmake --build build --config Release

      - name: Build shared (DLL)
        shell: pwsh
        run: |
          cmake -B build-shared -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_SHARED_LIBS=ON `
            -DHYPERDHT_BUILD_TESTS=OFF `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_TOOLCHAIN" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static-md
          cmake --build build-shared --config Release

      - name: Package library
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/lib, dist/include | Out-Null
          # Static lib: hyperdht.lib (built with /MD, no DLL)
          Copy-Item build/hyperdht.lib dist/lib/hyperdht_static.lib
          # DLL + its import lib (linker stub)
          Copy-Item build-shared/hyperdht.dll dist/lib/
          Copy-Item build-shared/hyperdht.lib dist/lib/
          # Headers
          Copy-Item -Recurse include/hyperdht dist/include/
          # Zip up
          Compress-Archive -Path dist/* -DestinationPath hyperdht-x86_64-windows.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: hyperdht-x86_64-windows
          path: hyperdht-x86_64-windows.zip

      # ----------------------------------------------------------------
      # Build nospoon-cpp on top of the just-built hyperdht DLL.
      # ----------------------------------------------------------------

      - name: Build nospoon.exe
        shell: pwsh
        run: |
          # Link the STATIC hyperdht.lib from build/ (the DLL only exports
          # the C FFI; nospoon uses C++ classes directly).
          cmake -B examples/cpp/nospoon/build -G Ninja -S examples/cpp/nospoon `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_TOOLCHAIN" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static-md `
            -DHYPERDHT_LIB_DIR="$env:GITHUB_WORKSPACE/build"
          cmake --build examples/cpp/nospoon/build --config Release

      - name: Download Wintun runtime DLL
        shell: pwsh
        run: |
          # Wintun ships as a DLL only — load via LoadLibrary at runtime.
          # 0.14.1 is the version nospoon-js currently uses.
          $url = "https://www.wintun.net/builds/wintun-0.14.1.zip"
          Invoke-WebRequest -Uri $url -OutFile wintun.zip
          Expand-Archive -Path wintun.zip -DestinationPath wintun-extract -Force
          # Layout: wintun-extract/wintun/bin/amd64/wintun.dll
          Copy-Item wintun-extract/wintun/bin/amd64/wintun.dll examples/cpp/nospoon/build/wintun.dll

      - name: Package nospoon
        shell: pwsh
        run: |
          # nospoon.exe statically links hyperdht + libsodium + libuv, so it
          # only needs wintun.dll alongside it at runtime.
          New-Item -ItemType Directory -Force -Path nospoon-dist | Out-Null
          Copy-Item examples/cpp/nospoon/build/nospoon.exe nospoon-dist/
          Copy-Item examples/cpp/nospoon/build/wintun.dll  nospoon-dist/
          @"
          Nospoon C++ — Windows x86_64 build

          Run from an elevated PowerShell or cmd window (Wintun installs its
          kernel driver on first launch and TUN config requires admin).

          Files:
            nospoon.exe   — the VPN client/server (statically linked)
            wintun.dll    — Wintun userspace API (TUN driver host)

          Quick start:
            .\nospoon.exe genkey            # generate a keypair
            .\nospoon.exe config.jsonc      # start client/server per config

          See https://github.com/jjacke13/hyperdht-cpp/tree/main/examples/cpp/nospoon
          for config schema.
          "@ | Out-File -Encoding utf8 nospoon-dist/README.txt
          Compress-Archive -Path nospoon-dist/* -DestinationPath nospoon-x86_64-windows.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: nospoon-x86_64-windows
          path: nospoon-x86_64-windows.zip
